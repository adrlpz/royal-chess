[package]
name = "royal-chess-escrow"
version = "0.1.0"
description = "Royal Chess Escrow Program for Solana"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "royal_chess_escrow"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = ["init-if-needed"]
init-if-needed = []

[dependencies]
anchor-lang = { version = "0.30.1", features = ["init-if-needed"] }
anchor-spl = "0.30.1"
solana-program = "~1.18"
