name: Build Solana Program

on:
  push:
    branches: [main]
    paths:
      - 'packages/contracts/solana/**'
  workflow_dispatch:

jobs:
  build-solana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.2.7/install)" 2>&1 | tail -1
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked 2>&1 | tail -3

      - name: Configure Solana
        run: |
          solana config set --url devnet 2>&1 | tail -1
          solana-keygen new --no-bip39-passphrase --force --outfile ~/.config/solana/id.json 2>&1 | tail -1

      - name: Build program
        working-directory: packages/contracts/solana
        run: |
          rm -f Cargo.lock
          anchor build 2>&1 | tail -5

      - name: Get program info
        working-directory: packages/contracts/solana
        id: info
        run: |
          PROGRAM_ID=$(solana address -k target/deploy/royal_chess_escrow-keypair.json 2>/dev/null)
          echo "program_id=$PROGRAM_ID" >> $GITHUB_OUTPUT
          echo ""
          echo "=== Token ready to deploy ==="
          echo "  Program ID: $PROGRAM_ID"
          echo "  Network:    devnet"
          echo ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solana-program
          path: |
            packages/contracts/solana/target/deploy/royal_chess_escrow.so
            packages/contracts/solana/target/deploy/royal_chess_escrow-keypair.json
            packages/contracts/solana/target/idl/royal_chess_escrow.json
