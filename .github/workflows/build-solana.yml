name: Build Solana Program

on:
  push:
    branches: [main]
    paths:
      - 'packages/contracts/solana/**'
  workflow_dispatch:

jobs:
  build-solana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.79.0

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.2.7/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli

      - name: Configure Solana for devnet
        run: |
          solana config set --url devnet
          solana-keygen new --no-bip39-passphrase --force --outfile ~/.config/solana/id.json

      - name: Build program
        working-directory: packages/contracts/solana
        run: |
          anchor build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solana-program
          path: |
            packages/contracts/solana/target/deploy/royal_chess_escrow.so
            packages/contracts/solana/target/deploy/royal_chess_escrow-keypair.json
            packages/contracts/solana/target/idl/royal_chess_escrow.json
