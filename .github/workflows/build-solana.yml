name: Build & Deploy Solana Program

on:
  push:
    branches: [main]
    paths:
      - 'packages/contracts/solana/**'
  workflow_dispatch:

jobs:
  build-solana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        uses: solana-labs/setup-solana@v2
        with:
          solana-version: '2.2.7'

      - name: Install Anchor CLI
        uses: Backpacked/setup-anchor@v1
        with:
          anchor-version: '0.30.1'

      - name: Build program
        working-directory: packages/contracts/solana
        run: anchor build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solana-program
          path: |
            packages/contracts/solana/target/deploy/royal_chess_escrow.so
            packages/contracts/solana/target/deploy/royal_chess_escrow-keypair.json
            packages/contracts/solana/target/idl/royal_chess_escrow.json
